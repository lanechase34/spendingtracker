pre-commit:
  parallel: true
  jobs:
    - name: backend
      group:
        piped: true
        jobs:
          - name: format
            root: "backend/"
            run: box run-script format
          - name: lint
            root: "backend/"
            run: box run-script lint:error
    - name: frontend
      group:
        piped: true
        jobs:
          - name: format
            root: "frontend/"
            run: npm run format
          - name: lint
            root: "frontend/"
            run: npm run lint:fix
          - name: typecheck
            root: "frontend/"
            run: npm run typecheck
    - name: envcheck
      root: "backend/"
      run: box dotenv check --reverse

post-checkout:
  parallel: true
  commands:
    box-fix-json-lineending:
      run: echo 'config set JSON.lineEnding=`#chr 10`' | box
