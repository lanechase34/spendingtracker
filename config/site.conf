map $uri $cache_control {
    # Match cacheable extensions
    ~*\.(js|css|woff2|png|jpg|svg|ico|webp|gif)$ "public, immutable, max-age=31536000";
    default "no-store";
}

server {
    listen 80;
    server_name chaselane.dev www.chaselane.dev;
    return 301 https://$host$request_uri;
}

# Catch-all for unknown hosts
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    server_name _;
    # Abort TLS handshake without presenting a certificate
    ssl_reject_handshake on;
}

# HTTP Reverse Proxy
server {
    listen 443 ssl http2;
    server_name chaselane.dev www.chaselane.dev;

    # SSL certs
    ssl_certificate /etc/nginx/ssl/chaselane/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/chaselane/privatekey.pem;

    # Reverse proxy api calls to commandbox
    location /spendingtracker/api/v1/ {
        limit_req zone=general burst=50 nodelay;
        client_max_body_size 50M;

        proxy_pass http://backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Preserve original request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;

        # Don't cache API responses
        add_header Cache-Control "no-store" always;
        include snippets/security_headers_backend.conf;
    }

    # WebSocket endpoint
    location /spendingtracker/ws {
        limit_req zone=ws burst=20 nodelay;

        proxy_pass http://backend/ws;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve original request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable buffering for WebSocket
        proxy_buffering off;

        include snippets/security_headers_backend.conf;
    }

    # React frontend
    location = /spendingtracker {
        return 301 /spendingtracker/;
    }

    # SpendingTracker
    location ^~ /spendingtracker/ {
        alias /var/www/wwwroot/spendingtracker_frontend/;
        index index.html;

        # SPA routing
        try_files $uri $uri/ /spendingtracker/index.html;

        # Apply cache control based on file type
        add_header Cache-Control $cache_control always;
        include snippets/security_headers_frontend.conf;
    }

    # Root Portfolio Site
    location ^~ / {
        root /var/www/wwwroot/chaselane_portfolio;
        index index.html;

        # Cache static assets
        location ~* \.(js|css|woff2|png|jpg|svg|ico|webp|gif|pdf)$ {
            add_header Cache-Control $cache_control always;
            include snippets/security_headers_frontend.conf;
        }

        try_files $uri $uri/ =404;
        include snippets/security_headers_frontend.conf;
    }
}