name: Format, Lint, and Type Check

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - development

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-24.04
    environment: Test
    timeout-minutes: 10
    permissions:
      contents: read

    outputs:
      format_result: ${{ steps.export.outputs.format_result }}
      lint_result: ${{ steps.export.outputs.lint_result }}

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup CommandBox CLI
        uses: Ortus-Solutions/setup-commandbox@7be599028dcf77743854b2f6c720b15316f39be2 # v2.0.1
        with:
          version: latest

      - name: Configure CommandBox JSON Line Endings
        run: echo 'config set JSON.lineEnding=`#chr 10`' | box

      - name: Install Dependencies
        run: box install commandbox-cfformat,commandbox-cflint

      - name: Run Format Check
        id: format
        run: box run-script format:check

      - name: Run Lint Check
        id: lint
        if: always()
        run: box run-script lint:error

      - name: Export Step Results
        id: export
        if: always()
        env:
          FORMAT_OUTCOME: ${{ steps.format.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
        run: |
          echo "format_result=$FORMAT_OUTCOME" >> $GITHUB_OUTPUT
          echo "lint_result=$LINT_OUTCOME" >> $GITHUB_OUTPUT

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-24.04
    environment: Test
    timeout-minutes: 10
    permissions:
      contents: read

    outputs:
      format_result: ${{ steps.export.outputs.format_result }}
      lint_result: ${{ steps.export.outputs.lint_result }}
      typecheck_result: ${{ steps.export.outputs.typecheck_result }}
      audit_result: ${{ steps.export.outputs.audit_result }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Format Check
        id: format
        run: npm run format:check

      - name: Run Lint Check
        id: lint
        if: always()
        run: npm run lint

      - name: Run Type Check
        id: typecheck
        if: always()
        run: npm run typecheck

      - name: Run Security Audit
        id: audit
        if: always()
        run: npm run audit:prod

      - name: Export Step Results
        id: export
        if: always()
        env:
          FORMAT_OUTCOME: ${{ steps.format.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
        run: |
          echo "format_result=$FORMAT_OUTCOME" >> $GITHUB_OUTPUT
          echo "lint_result=$LINT_OUTCOME" >> $GITHUB_OUTPUT
          echo "typecheck_result=$TYPECHECK_OUTCOME" >> $GITHUB_OUTPUT
          echo "audit_result=$AUDIT_OUTCOME" >> $GITHUB_OUTPUT

  report:
    name: Housekeeping Report
    runs-on: ubuntu-24.04
    needs: [backend-checks, frontend-checks]
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Evaluate Job Results
        id: results
        env:
          BACKEND_FMT: ${{ needs.backend-checks.outputs.format_result }}
          BACKEND_LINT: ${{ needs.backend-checks.outputs.lint_result }}
          FRONTEND_FMT: ${{ needs.frontend-checks.outputs.format_result }}
          FRONTEND_LINT: ${{ needs.frontend-checks.outputs.lint_result }}
          FRONTEND_TYPE: ${{ needs.frontend-checks.outputs.typecheck_result }}
          FRONTEND_AUDIT: ${{ needs.frontend-checks.outputs.audit_result }}
          BACKEND_RESULT: ${{ needs.backend-checks.result }}
          FRONTEND_RESULT: ${{ needs.frontend-checks.result }}
        run: |
          to_emoji() {
            if [ "$1" = "success" ]; then echo "✅"
            elif [ "$1" = "skipped" ]; then echo "⏭️"
            else echo "❌"
            fi
          }

          backend_fmt_icon=$(to_emoji "$BACKEND_FMT")
          backend_lint_icon=$(to_emoji "$BACKEND_LINT")
          frontend_fmt_icon=$(to_emoji "$FRONTEND_FMT")
          frontend_lint_icon=$(to_emoji "$FRONTEND_LINT")
          frontend_type_icon=$(to_emoji "$FRONTEND_TYPE")
          frontend_audit_icon=$(to_emoji "$FRONTEND_AUDIT")

          if [ "$BACKEND_RESULT" = "success" ] && [ "$FRONTEND_RESULT" = "success" ]; then
            overall="✅ All checks passed"
            conclusion="success"
          else
            overall="❌ Some checks failed - run \`lefthook run pre-commit\` locally to fix before pushing"
            conclusion="failure"
          fi

          echo "backend_fmt_icon=$backend_fmt_icon" >> $GITHUB_OUTPUT
          echo "backend_lint_icon=$backend_lint_icon" >> $GITHUB_OUTPUT
          echo "frontend_fmt_icon=$frontend_fmt_icon" >> $GITHUB_OUTPUT
          echo "frontend_lint_icon=$frontend_lint_icon" >> $GITHUB_OUTPUT
          echo "frontend_type_icon=$frontend_type_icon" >> $GITHUB_OUTPUT
          echo "frontend_audit_icon=$frontend_audit_icon" >> $GITHUB_OUTPUT
          echo "overall=$overall" >> $GITHUB_OUTPUT
          echo "conclusion=$conclusion" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          BACKEND_FMT_ICON: ${{ steps.results.outputs.backend_fmt_icon }}
          BACKEND_FMT: ${{ needs.backend-checks.outputs.format_result }}
          BACKEND_LINT_ICON: ${{ steps.results.outputs.backend_lint_icon }}
          BACKEND_LINT: ${{ needs.backend-checks.outputs.lint_result }}
          FRONTEND_FMT_ICON: ${{ steps.results.outputs.frontend_fmt_icon }}
          FRONTEND_FMT: ${{ needs.frontend-checks.outputs.format_result }}
          FRONTEND_LINT_ICON: ${{ steps.results.outputs.frontend_lint_icon }}
          FRONTEND_LINT: ${{ needs.frontend-checks.outputs.lint_result }}
          FRONTEND_TYPE_ICON: ${{ steps.results.outputs.frontend_type_icon }}
          FRONTEND_TYPE: ${{ needs.frontend-checks.outputs.typecheck_result }}
          FRONTEND_AUDIT_ICON: ${{ steps.results.outputs.frontend_audit_icon }}
          FRONTEND_AUDIT: ${{ needs.frontend-checks.outputs.audit_result }}
          OVERALL: ${{ steps.results.outputs.overall }}
        with:
          script: |
            const body = [
              '## Housekeeping Report',
              '',
              '### Backend',
              '| Check | Status |',
              '|-------|--------|',
              `| Format | ${process.env.BACKEND_FMT_ICON} ${process.env.BACKEND_FMT} |`,
              `| Lint | ${process.env.BACKEND_LINT_ICON} ${process.env.BACKEND_LINT} |`,
              '',
              '### Frontend',
              '| Check | Status |',
              '|-------|--------|',
              `| Format | ${process.env.FRONTEND_FMT_ICON} ${process.env.FRONTEND_FMT} |`,
              `| Lint | ${process.env.FRONTEND_LINT_ICON} ${process.env.FRONTEND_LINT} |`,
              `| Typecheck | ${process.env.FRONTEND_TYPE_ICON} ${process.env.FRONTEND_TYPE} |`,
              `| Security Audit | ${process.env.FRONTEND_AUDIT_ICON} ${process.env.FRONTEND_AUDIT} |`,
              '',
              `**${process.env.OVERALL}**`,
              '',
              '_If failing, run `lefthook run pre-commit` locally to fix before pushing._'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Housekeeping Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if checks failed
        if: steps.results.outputs.conclusion == 'failure'
        run: exit 1
