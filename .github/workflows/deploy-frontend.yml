name: Deploy Frontend

on:
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy:
    if: ${{ github.actor == github.repository_owner }}
    runs-on: ubuntu-24.04
    environment: Production
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Version File
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          cat > build/version.json << EOF
          {
            "buildDate": "$(date)",
            "runId": "$RUN_ID"
          }
          EOF

      - name: Verify build output
        run: |
          if [ ! -d "build" ]; then
            echo "Build directory not found!"
            exit 1
          fi
          echo "Build successful, files:"
          ls -la build/

      - name: Update backend code
        uses: burnett01/rsync-deployments@70ff22f5b4c2bb0e08d0bf20de693389e5552047 #v8
        # a - archive preserve permissions, ownership, and symbolic links, v - verbose, z - compress
        with:
          switches: -avz --delete --rsync-path="sudo rsync"
          path: frontend/build/
          remote_path: /var/www/wwwroot/spendingtracker_frontend/
          remote_host: ${{ secrets.LIGHTSAIL_IP }}
          remote_user: ${{ secrets.LIGHTSAIL_USERNAME }}
          remote_key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
