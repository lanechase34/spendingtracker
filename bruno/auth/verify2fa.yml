info:
  name: verify2fa
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/v1/verify2fa?code=290258"
  headers:
    - name: x-auth-token
      value: "{{access_token}}"
  params:
    - name: code
      value: "290258"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var response = res.getBody();
        var token = response.data.access_token;
        bru.setVar('access_token', token);
        console.log('access_token updated, verified via 2fa:', token);

        // Automatically run the CSRF request after login
        await bru.runRequest('csrf');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
