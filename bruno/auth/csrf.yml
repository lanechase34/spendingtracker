info:
  name: csrf
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/v1/csrf"
  headers:
    - name: x-auth-token
      value: "{{access_token}}"
  body:
    type: multipart-form
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var response = res.getBody();
        var token = response.data.csrf_token;
        bru.setVar('csrf_token', token);
        console.log('csrf_token updated:', token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
