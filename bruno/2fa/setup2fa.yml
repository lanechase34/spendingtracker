info:
  name: setup2fa
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/v1/me/2fa/setup"
  headers:
    - name: x-auth-token
      value: "{{access_token}}"
    - name: x-csrf-token
      value: "{{csrf_token}}"
  body:
    type: multipart-form
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
